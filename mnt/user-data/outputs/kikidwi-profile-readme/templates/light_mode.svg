<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Ubuntu, Sans-Serif">
  <style>
    .bg { fill: #ffffff; }
    .card { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1; }
    .title { fill: #0969da; font-size: 26px; font-weight: 700; }
    .subtitle { fill: #57606a; font-size: 15px; }
    .label { fill: #57606a; font-size: 13px; }
    .value { fill: #24292f; font-size: 20px; font-weight: 700; }
    .skill { fill: #24292f; font-size: 13px; }
    .skill-pill { fill: #eaeef2; stroke: #d0d7de; }
    .footer { fill: #6e7781; font-size: 12px; }
    .accent { fill: #1a7f37; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    .fade { animation: fadein 1.2s ease-in-out; }
  </style>

  <rect class="bg" width="800" height="420" rx="10"/>
  <rect class="card" x="10" y="10" width="780" height="400" rx="10"/>

  <!-- Header -->
  <text x="40" y="60" class="title fade">kiki dwi prasetyo</text>
  <text x="40" y="86" class="subtitle fade">Web Developer • Python · JavaScript · Laravel · Kotlin</text>
  <text x="40" y="108" class="footer">🕒 Uptime: {{ age_data }}</text>

  <line x1="40" y1="128" x2="760" y2="128" stroke="#d0d7de" stroke-width="1"/>

  <!-- Stats grid -->
  <g class="fade">
    <text x="40"  y="160" class="label">Public Repos</text>
    <text x="40"  y="186" class="value">{{ repo_data }}</text>

    <text x="220" y="160" class="label">Total Stars</text>
    <text x="220" y="186" class="value">{{ star_data }}</text>

    <text x="400" y="160" class="label">Followers</text>
    <text x="400" y="186" class="value">{{ follower_data }}</text>

    <text x="580" y="160" class="label">Commits (this yr)</text>
    <text x="580" y="186" class="value">{{ commit_data }}</text>
  </g>

  <line x1="40" y1="210" x2="760" y2="210" stroke="#d0d7de" stroke-width="1"/>

  <!-- Lines of code -->
  <g class="fade">
    <text x="40" y="240" class="label">Lines of Code (all repos, all-time)</text>
    <text x="40" y="266" class="value accent">
      + {{ loc_add }}<tspan fill="#cf222e"> / − {{ loc_del }}</tspan>
    </text>
    <text x="40" y="288" class="label">Net: {{ loc_net }} lines</text>
  </g>

  <line x1="40" y1="310" x2="760" y2="310" stroke="#d0d7de" stroke-width="1"/>

  <!-- Skills -->
  <g class="fade">
    <text x="40" y="336" class="label">Tech Stack</text>
    <rect x="40"  y="348" width="70"  height="26" rx="13" class="skill-pill"/>
    <text x="55"  y="365" class="skill">Python</text>
    <rect x="118" y="348" width="90"  height="26" rx="13" class="skill-pill"/>
    <text x="133" y="365" class="skill">JavaScript</text>
    <rect x="216" y="348" width="80"  height="26" rx="13" class="skill-pill"/>
    <text x="231" y="365" class="skill">Laravel</text>
    <rect x="304" y="348" width="76"  height="26" rx="13" class="skill-pill"/>
    <text x="319" y="365" class="skill">Kotlin</text>
  </g>

  <!-- Footer -->
  <text x="40" y="400" class="footer">github.com/kikidwi · instagram.com/kikii.dwp</text>
</svg>
